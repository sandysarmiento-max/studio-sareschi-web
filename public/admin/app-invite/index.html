<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Invitar clienta | Studio Sareschi</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .invite-card {
        max-width: 580px;
        margin: 0 auto;
        display: grid;
        gap: 14px;
        border-color: #efd8e7;
      }
      .invite-form {
        display: grid;
        gap: 12px;
      }
      .invite-form label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        color: #6f6471;
      }
      .status {
        margin: 0;
        font-size: 14px;
      }
      .status-ok {
        color: #2f6f44;
      }
      .status-error {
        color: #8f1d4f;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Studio Sareschi</a>
      </div>
    </header>

    <main class="section section-soft">
      <div class="container">
        <article class="card invite-card">
          <div class="section-heading" style="margin: 0">
            <p class="eyebrow">Panel admin</p>
            <h1 style="margin-bottom: 8px">Invitar clienta a una app</h1>
            <p class="hero-copy" style="margin: 0">Envía invitación y activa acceso automáticamente.</p>
          </div>

          <form id="invite-form" class="invite-form">
            <label>
              Clave admin
              <input id="token" type="password" autocomplete="off" required />
            </label>

            <label>
              Correo
              <input id="email" type="email" autocomplete="email" required placeholder="clienta@correo.com" />
            </label>

            <label>
              App
              <select id="app-key" required>
                <option value="aral_calc">Aral Calc</option>
                <option value="folia">Folia</option>
              </select>
            </label>

            <button class="btn btn-primary" type="submit" id="send-btn">Enviar invitación</button>
          </form>

          <p id="status" class="status tiny-note" aria-live="polite">Listo para enviar.</p>
        </article>
      </div>
    </main>

    <script>
      const STORAGE_KEY = 'app_invite_admin_token';
      const form = document.getElementById('invite-form');
      const emailInput = document.getElementById('email');
      const tokenInput = document.getElementById('token');
      const appKeyInput = document.getElementById('app-key');
      const statusEl = document.getElementById('status');
      const sendBtn = document.getElementById('send-btn');

      tokenInput.value = sessionStorage.getItem(STORAGE_KEY) || '';

      function setStatus(message, state = 'idle') {
        statusEl.textContent = message;
        statusEl.classList.remove('status-ok', 'status-error');

        if (state === 'ok') {
          statusEl.classList.add('status-ok');
          return;
        }

        if (state === 'error') {
          statusEl.classList.add('status-error');
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const email = String(emailInput.value || '').trim();
        const token = String(tokenInput.value || '').trim();
        const appKey = String(appKeyInput.value || '').trim();

        if (!token) {
          setStatus('Ingresa la clave admin.', 'error');
          return;
        }

        if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
          setStatus('Ingresa un correo válido.', 'error');
          return;
        }

        if (!appKey) {
          setStatus('Selecciona una app.', 'error');
          return;
        }

        sessionStorage.setItem(STORAGE_KEY, token);

        sendBtn.disabled = true;
        setStatus('Enviando invitación...', 'idle');

        try {
          const response = await fetch('/api/app-invite', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              email,
              app_key: appKey,
            }),
          });

          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            const reason = payload?.details || payload?.error || `Error ${response.status}`;
            setStatus(reason, 'error');
            return;
          }

          setStatus('Invitación enviada y acceso activado.', 'ok');
          emailInput.value = '';
        } catch (error) {
          setStatus(`Error de red: ${String(error?.message || error)}`, 'error');
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
