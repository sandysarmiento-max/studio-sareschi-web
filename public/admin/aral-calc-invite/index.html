<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Invitaciones Aral Calc | Studio Sareschi</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .invite-card {
        max-width: 560px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }
      .invite-form {
        display: grid;
        gap: 10px;
      }
      .invite-form label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        color: #6f6471;
      }
      .status {
        margin: 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Studio Sareschi</a>
      </div>
    </header>

    <main class="section section-soft">
      <div class="container">
        <article class="card invite-card">
          <div class="section-heading" style="margin: 0">
            <p class="eyebrow">Panel interno</p>
            <h1 style="margin-bottom: 8px">Invitaciones Aral Calc</h1>
            <p class="hero-copy" style="margin: 0">
              Pega el token de admin, ingresa un email y envía la invitación sin terminal.
            </p>
          </div>

          <form id="invite-form" class="invite-form">
            <label>
              Token admin (INVITE_ADMIN_TOKEN)
              <input id="token" type="password" autocomplete="off" required />
            </label>

            <label>
              Email
              <input id="email" type="email" autocomplete="email" required placeholder="clienta@correo.com" />
            </label>

            <button class="btn btn-primary" type="submit" id="send-btn">Enviar invitación</button>
          </form>

          <p id="status" class="status tiny-note">Listo para enviar.</p>
        </article>
      </div>
    </main>

    <script>
      const STORAGE_KEY = 'aral_calc_invite_admin_token';
      const form = document.getElementById('invite-form');
      const emailInput = document.getElementById('email');
      const tokenInput = document.getElementById('token');
      const statusEl = document.getElementById('status');
      const sendBtn = document.getElementById('send-btn');

      tokenInput.value = sessionStorage.getItem(STORAGE_KEY) || '';

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? '#8f1d4f' : '#6f6471';
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const email = String(emailInput.value || '').trim();
        const token = String(tokenInput.value || '').trim();

        if (!email) {
          setStatus('Ingresa un email.', true);
          return;
        }

        if (!token) {
          setStatus('Pega el token INVITE_ADMIN_TOKEN.', true);
          return;
        }

        sessionStorage.setItem(STORAGE_KEY, token);

        sendBtn.disabled = true;
        setStatus('Enviando invitación...');

        try {
          const response = await fetch('/api/aral-calc-invite', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ email }),
          });

          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            const reason = payload?.details || payload?.error || `Error ${response.status}`;
            setStatus(`No se pudo enviar: ${reason}`, true);
            return;
          }

          setStatus(`Invitación enviada a ${email}.`);
          emailInput.value = '';
        } catch (error) {
          setStatus(`Error de red: ${String(error?.message || error)}`, true);
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
