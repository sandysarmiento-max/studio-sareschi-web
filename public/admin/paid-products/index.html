<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Productos de paga | Studio Sareschi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .admin-grid { display:grid; gap:14px; }
      .admin-card { border:1px solid #f0dbe6; border-radius:16px; padding:16px; background:#fff; display:grid; gap:12px; }
      .admin-row { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); }
      .admin-field label { font-size:13px; display:block; margin-bottom:6px; color:#6f6471; }
      .admin-field input, .admin-field textarea { width:100%; }
      .preview-grid { display:grid; grid-template-columns:repeat(4,minmax(120px,1fr)); gap:10px; }
      .preview-box { border:1px dashed #e6cdd9; border-radius:12px; padding:8px; display:grid; gap:8px; }
      .preview-box img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; background:#faf3f7; }
      .admin-actions { display:flex; gap:8px; flex-wrap:wrap; }
      .hidden { display:none !important; }
      @media (max-width:820px){ .preview-grid { grid-template-columns:repeat(2,minmax(120px,1fr)); } }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Studio Sareschi</a>
        <nav aria-label="Principal">
          <ul class="nav-links">
            <li><a href="/pdfs/">Tienda PDF</a></li>
            <li><a href="/acceso/">Acceso</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="section section-soft">
      <div class="container" style="display:grid;gap:18px;max-width:1100px;">
        <div class="section-heading" style="margin:0;">
          <p class="eyebrow">Panel privado</p>
          <h1>Gestor de productos de paga</h1>
          <p class="hero-copy" style="margin:0;">Crea, edita y oculta tarjetas sin tocar código.</p>
        </div>

        <article class="card" id="auth-card" style="max-width:560px;">
          <form id="login-form" style="display:grid;gap:10px;">
            <label>Email <input id="email" type="email" required autocomplete="email" /></label>
            <label>Contraseña <input id="password" type="password" required autocomplete="current-password" /></label>
            <button class="btn btn-primary" id="login-btn" type="submit">Entrar al panel</button>
          </form>
          <div id="session-box" class="hidden" style="display:grid;gap:8px;">
            <p style="margin:0;"><strong>Sesión activa</strong> · ya puedes administrar productos.</p>
            <div class="admin-actions">
              <button class="btn btn-secondary" id="refresh-btn" type="button">Actualizar lista</button>
              <button class="btn btn-secondary" id="logout-btn" type="button">Cerrar sesión</button>
            </div>
          </div>
          <p id="status" class="tiny-note" style="margin:0;"></p>
        </article>

        <section id="panel" class="hidden" style="display:grid;gap:12px;">
          <div class="admin-actions">
            <button id="new-product-btn" type="button" class="btn btn-primary">+ Nuevo producto</button>
          </div>
          <div id="products-grid" class="admin-grid"></div>
        </section>
      </div>
    </main>

    <script>
      const IMAGE_SLOTS = [
        { key: 'main_image_url', label: 'Imagen principal' },
        { key: 'preview_01_url', label: 'Preview 1' },
        { key: 'preview_02_url', label: 'Preview 2' },
        { key: 'preview_03_url', label: 'Preview 3' },
      ];

      const statusEl = document.getElementById('status');
      const form = document.getElementById('login-form');
      const sessionBox = document.getElementById('session-box');
      const loginBtn = document.getElementById('login-btn');
      const logoutBtn = document.getElementById('logout-btn');
      const refreshBtn = document.getElementById('refresh-btn');
      const panel = document.getElementById('panel');
      const productsGrid = document.getElementById('products-grid');
      const newBtn = document.getElementById('new-product-btn');

      let supabaseClient = null;
      let accessToken = '';
      let products = [];

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? '#8f1d4f' : '#6f6471';
      }

      async function getConfig() {
        const response = await fetch('/api/auth-config', { headers: { Accept: 'application/json' } });
        return response.json();
      }

      function sanitizeCode(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9-]/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '');
      }

      function createEmptyProduct() {
        return {
          id: '',
          code: `producto-${Date.now()}`,
          title: '',
          description: '',
          price_pdf_pe: 0,
          price_pdf_int: 0,
          price_canva_pe: 0,
          price_canva_int: 0,
          main_image_url: '',
          preview_01_url: '',
          preview_02_url: '',
          preview_03_url: '',
          active: true,
          sort_order: products.length,
        };
      }

      async function apiRequest(method, body) {
        const response = await fetch('/api/paid-products-admin', {
          method,
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${accessToken}`,
          },
          body: body ? JSON.stringify(body) : undefined,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload?.error || 'Error inesperado.');
        }
        return payload;
      }

      function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const result = String(reader.result || '');
            const base64 = result.includes(',') ? result.split(',')[1] : result;
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function field(name, label, value, type = 'text') {
        const safeValue = value == null ? '' : String(value);
        if (name === 'description') {
          return `<div class="admin-field" style="grid-column:1/-1;"><label>${label}</label><textarea data-field="${name}" rows="3">${safeValue.replaceAll('<','&lt;')}</textarea></div>`;
        }
        return `<div class="admin-field"><label>${label}</label><input data-field="${name}" type="${type}" value="${safeValue.replaceAll('"','&quot;')}" /></div>`;
      }

      function renderProducts() {
        productsGrid.innerHTML = '';
        products
          .slice()
          .sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0))
          .forEach((product, index) => {
            const card = document.createElement('article');
            card.className = 'admin-card';
            card.dataset.index = String(index);
            card.innerHTML = `
              <div class="admin-row">
                ${field('title', 'Título', product.title)}
                ${field('code', 'Código (slug)', product.code)}
                ${field('sort_order', 'Orden', product.sort_order, 'number')}
              </div>
              <div class="admin-row">${field('description', 'Descripción', product.description)}</div>
              <div class="admin-row">
                ${field('price_pdf_pe', 'Precio PDF Perú (S/)', product.price_pdf_pe, 'number')}
                ${field('price_pdf_int', 'Precio PDF Int (USD)', product.price_pdf_int, 'number')}
                ${field('price_canva_pe', 'Precio Canva Perú (S/)', product.price_canva_pe, 'number')}
                ${field('price_canva_int', 'Precio Canva Int (USD)', product.price_canva_int, 'number')}
              </div>
              <div class="preview-grid">
                ${IMAGE_SLOTS.map((slot) => `
                  <div class="preview-box" data-slot="${slot.key}">
                    <strong style="font-size:13px;">${slot.label}</strong>
                    <img src="${product[slot.key] || ''}" alt="${slot.label}" />
                    <input type="file" data-upload="${slot.key}" accept="image/*" />
                  </div>
                `).join('')}
              </div>
              <div class="admin-actions">
                <label style="display:flex;align-items:center;gap:8px;">
                  <input data-field="active" type="checkbox" ${product.active ? 'checked' : ''} /> Activo
                </label>
                <button type="button" class="btn btn-primary" data-save>Guardar producto</button>
              </div>
            `;
            productsGrid.appendChild(card);
          });
      }

      function collectProduct(card, current) {
        const next = { ...current };
        card.querySelectorAll('[data-field]').forEach((input) => {
          const key = input.dataset.field;
          if (input.type === 'checkbox') {
            next[key] = input.checked;
            return;
          }
          const value = input.value;
          if (key.startsWith('price_') || key === 'sort_order') {
            next[key] = Number(value || 0);
          } else if (key === 'code') {
            next[key] = sanitizeCode(value);
          } else {
            next[key] = value.trim();
          }
        });
        return next;
      }

      async function loadProducts() {
        const payload = await apiRequest('GET');
        products = Array.isArray(payload.products) ? payload.products : [];
        renderProducts();
      }

      async function ensureSession() {
        const config = await getConfig();
        if (!config.enabled) {
          setStatus('Falta SUPABASE_URL y SUPABASE_ANON_KEY en Vercel.', true);
          form.classList.add('hidden');
          return;
        }

        supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session?.access_token) {
          accessToken = session.access_token;
          form.classList.add('hidden');
          sessionBox.classList.remove('hidden');
          panel.classList.remove('hidden');
          setStatus('Sesión recuperada.');
          await loadProducts();
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!supabaseClient) return;

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        loginBtn.disabled = true;
        setStatus('Iniciando sesión...');

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        loginBtn.disabled = false;

        if (error || !data?.session?.access_token) {
          setStatus('No se pudo iniciar sesión.', true);
          return;
        }

        accessToken = data.session.access_token;
        form.classList.add('hidden');
        sessionBox.classList.remove('hidden');
        panel.classList.remove('hidden');
        setStatus('Sesión iniciada correctamente.');

        try {
          await loadProducts();
        } catch (apiError) {
          setStatus(apiError.message, true);
        }
      });

      refreshBtn.addEventListener('click', async () => {
        try {
          await loadProducts();
          setStatus('Lista actualizada.');
        } catch (error) {
          setStatus(error.message, true);
        }
      });

      logoutBtn.addEventListener('click', async () => {
        if (supabaseClient) {
          await supabaseClient.auth.signOut();
        }
        window.location.reload();
      });

      newBtn.addEventListener('click', () => {
        products.unshift(createEmptyProduct());
        renderProducts();
      });

      productsGrid.addEventListener('change', async (event) => {
        const uploadInput = event.target.closest('[data-upload]');
        if (!uploadInput || !uploadInput.files?.[0]) {
          return;
        }

        const card = uploadInput.closest('.admin-card');
        const index = Number(card.dataset.index);
        const product = collectProduct(card, products[index]);

        if (!product.id) {
          setStatus('Guarda primero el producto para habilitar subida de imágenes.', true);
          uploadInput.value = '';
          return;
        }

        try {
          const file = uploadInput.files[0];
          const dataBase64 = await readFileAsBase64(file);
          const payload = await apiRequest('POST', {
            action: 'upload',
            productId: product.id,
            slot: uploadInput.dataset.upload,
            fileName: file.name,
            contentType: file.type || 'image/jpeg',
            dataBase64,
          });

          product[uploadInput.dataset.upload] = payload.publicUrl;
          products[index] = product;
          renderProducts();
          setStatus('Imagen subida. Recuerda guardar para confirmar cambios.');
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          uploadInput.value = '';
        }
      });

      productsGrid.addEventListener('click', async (event) => {
        const saveBtn = event.target.closest('[data-save]');
        if (!saveBtn) {
          return;
        }

        const card = saveBtn.closest('.admin-card');
        const index = Number(card.dataset.index);
        const product = collectProduct(card, products[index]);

        saveBtn.disabled = true;
        setStatus('Guardando producto...');

        try {
          const payload = product.id
            ? await apiRequest('PATCH', product)
            : await apiRequest('POST', product);

          products[index] = payload.product;
          renderProducts();
          setStatus('Producto guardado correctamente.');
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          saveBtn.disabled = false;
        }
      });

      ensureSession().catch(() => {
        setStatus('No se pudo iniciar el panel admin.', true);
      });
    </script>
  </body>
</html>
