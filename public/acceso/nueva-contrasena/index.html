<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva contraseña | Studio Sareschi</title>
    <meta
      name="description"
      content="Define una nueva contraseña para tu acceso a apps protegidas de Studio Sareschi."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Studio Sareschi</a>
        <nav aria-label="Principal">
          <ul class="nav-links">
            <li><a id="login-nav-link" href="/acceso/?app=aral_calc">Iniciar sesión</a></li>
            <li><a id="app-nav-link" href="/aral-calc-guia/">Aral Calc</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section section-soft">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow">Soporte de acceso</p>
            <h1 id="page-title">Crear nueva contraseña</h1>
            <p id="hero-copy" class="hero-copy" style="margin: 0">
              Completa tu primer acceso por invitación o recupera tu contraseña con este formulario.
            </p>
          </div>

          <article class="card" style="max-width: 620px">
            <form id="update-password-form" style="display: grid; gap: 12px" hidden>
              <label>
                Nueva contraseña
                <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
                  <input
                    id="password"
                    type="password"
                    required
                    minlength="8"
                    autocomplete="new-password"
                    style="width:100%;margin-top:0"
                  />
                  <button
                    id="toggle-password"
                    type="button"
                    class="btn btn-secondary"
                    aria-label="Mostrar contraseña"
                    aria-pressed="false"
                    style="padding:10px 12px;line-height:1"
                  >
                    👁️
                  </button>
                </div>
              </label>
              <label>
                Repetir nueva contraseña
                <input
                  id="password-confirm"
                  type="password"
                  required
                  minlength="8"
                  autocomplete="new-password"
                  style="width:100%;margin-top:6px"
                />
              </label>
              <button id="update-password-btn" class="btn btn-primary" type="submit">Guardar nueva contraseña</button>
            </form>

            <p id="status" class="tiny-note" aria-live="polite" style="margin-top: 12px"></p>

            <a id="back-login-link" class="btn btn-secondary" href="/acceso/?app=aral_calc" style="display:inline-flex;margin-top:16px">
              Volver a iniciar sesión
            </a>
          </article>
        </div>
      </section>
    </main>

    <script>
      const APP_CONFIG = {
        aral_calc: {
          name: 'Aral Calc',
          loginPath: '/acceso/?app=aral_calc',
          appNavLabel: 'Aral Calc',
          appNavPath: '/aral-calc-guia/',
        },
        folia: {
          name: 'Folia',
          loginPath: '/acceso/?app=folia',
          appNavLabel: 'Folia',
          appNavPath: '/app/folia/',
        },
      };

      const form = document.getElementById('update-password-form');
      const statusEl = document.getElementById('status');
      const updatePasswordBtn = document.getElementById('update-password-btn');
      const backLoginLink = document.getElementById('back-login-link');
      const loginNavLink = document.getElementById('login-nav-link');
      const appNavLink = document.getElementById('app-nav-link');
      const pageTitle = document.getElementById('page-title');
      const heroCopy = document.getElementById('hero-copy');
      const passwordInput = document.getElementById('password');
      const passwordConfirmInput = document.getElementById('password-confirm');
      const togglePasswordBtn = document.getElementById('toggle-password');

      const queryParams = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const requestedApp = (queryParams.get('app') || hashParams.get('app') || '').trim().toLowerCase();
      const currentApp = APP_CONFIG[requestedApp] || APP_CONFIG.aral_calc;

      let supabaseClient = null;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? '#8f1d4f' : '';
      }

      function applyAppContext() {
        document.title = `Nueva contraseña ${currentApp.name} | Studio Sareschi`;
        pageTitle.textContent = `Crear nueva contraseña para ${currentApp.name}`;
        heroCopy.textContent = `Completa tu primer acceso por invitación o recupera tu contraseña para ${currentApp.name}.`;

        const contextualLogin = currentApp.loginPath;
        backLoginLink.href = contextualLogin;
        loginNavLink.href = contextualLogin;

        appNavLink.href = currentApp.appNavPath;
        appNavLink.textContent = currentApp.appNavLabel;
      }

      function getFinalLoginUrl() {
        return `${currentApp.loginPath}`;
      }

      async function bootAuth() {
        const response = await fetch('/api/auth-config', { headers: { Accept: 'application/json' } });
        const config = await response.json();

        if (!config.enabled) {
          setStatus(
            'Falta configurar SUPABASE_URL y SUPABASE_ANON_KEY en Vercel para habilitar esta pantalla.',
            true
          );
          return;
        }

        supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

        const code = queryParams.get('code');
        const queryError = queryParams.get('error');
        const queryErrorDescription = queryParams.get('error_description');
        const hashError = hashParams.get('error');
        const hashErrorDescription = hashParams.get('error_description');
        const accessToken = hashParams.get('access_token') || queryParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token') || queryParams.get('refresh_token');

        if (code) {
          const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
          if (error) {
            setStatus('El enlace no es válido o ya expiró. Solicita uno nuevo.', true);
            return;
          }
          window.history.replaceState({}, document.title, `${window.location.pathname}?app=${encodeURIComponent(requestedApp || 'aral_calc')}`);
        }

        const inboundError = queryError || hashError;
        if (!code && inboundError) {
          setStatus(
            decodeURIComponent(queryErrorDescription || hashErrorDescription || 'No se pudo validar el enlace enviado por email.'),
            true
          );
          return;
        }

        if (!code && accessToken && refreshToken) {
          const { error } = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });
          if (error) {
            setStatus('El enlace no es válido o ya expiró. Solicita uno nuevo.', true);
            return;
          }
          window.history.replaceState({}, document.title, `${window.location.pathname}?app=${encodeURIComponent(requestedApp || 'aral_calc')}`);
        }

        const {
          data: { session: activeSession },
        } = await supabaseClient.auth.getSession();

        if (!activeSession) {
          setStatus('Abre esta página desde el enlace enviado por email para poder crear tu contraseña.', true);
          return;
        }

        form.hidden = false;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!supabaseClient) {
          return;
        }

        const password = passwordInput.value;
        const confirm = passwordConfirmInput.value;

        if (password.length < 8) {
          setStatus('La contraseña debe tener al menos 8 caracteres.', true);
          return;
        }

        if (password !== confirm) {
          setStatus('Las contraseñas no coinciden.', true);
          return;
        }

        updatePasswordBtn.disabled = true;
        setStatus('Guardando nueva contraseña...');

        const { error } = await supabaseClient.auth.updateUser({ password });

        updatePasswordBtn.disabled = false;

        if (error) {
          setStatus('No se pudo actualizar la contraseña. Solicita un nuevo enlace e intenta otra vez.', true);
          return;
        }

        form.reset();
        setStatus('Contraseña actualizada. Redirigiendo al acceso...');
        window.location.href = getFinalLoginUrl();
      });

      togglePasswordBtn.addEventListener('click', () => {
        const showingPassword = passwordInput.type === 'text';
        passwordInput.type = showingPassword ? 'password' : 'text';
        passwordConfirmInput.type = showingPassword ? 'password' : 'text';
        togglePasswordBtn.setAttribute('aria-pressed', String(!showingPassword));
        togglePasswordBtn.setAttribute('aria-label', showingPassword ? 'Mostrar contraseña' : 'Ocultar contraseña');
      });

      applyAppContext();

      bootAuth().catch(() => {
        setStatus('No se pudo inicializar esta pantalla en este momento. Intenta de nuevo.', true);
      });
    </script>
  </body>
</html>
