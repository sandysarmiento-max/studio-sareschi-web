<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aceptar invitación | Studio Sareschi</title>
    <meta
      name="description"
      content="Validando invitación para crear tu contraseña de acceso en Studio Sareschi."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Studio Sareschi</a>
        <nav aria-label="Principal">
          <ul class="nav-links">
            <li><a href="/acceso/">Iniciar sesión</a></li>
            <li><a href="/aral-calc-guia/">Aral Calc</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section section-soft">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow">Acceso por invitación</p>
            <h1>Aceptando tu invitación…</h1>
            <p class="hero-copy" style="margin: 0">
              Estamos validando tu enlace para que puedas crear tu contraseña.
            </p>
          </div>

          <article class="card" style="max-width: 620px">
            <p id="status" class="tiny-note" aria-live="polite"></p>
            <a id="fallback-link" class="btn btn-secondary" href="/acceso/" style="display:inline-flex;margin-top:16px">
              Volver a iniciar sesión
            </a>
          </article>
        </div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById('status');

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? '#8f1d4f' : '';
      }

      function inferAppKey(queryParams, hashParams) {
        const explicitApp = queryParams.get('app') || hashParams.get('app');
        if (explicitApp === 'folia' || explicitApp === 'aral_calc') {
          return explicitApp;
        }

        const redirectHints = [
          queryParams.get('redirect_to'),
          hashParams.get('redirect_to'),
          queryParams.get('next'),
          hashParams.get('next'),
        ]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();

        if (redirectHints.includes('/folia') || redirectHints.includes('app=folia')) {
          return 'folia';
        }

        return 'aral_calc';
      }

      function buildPasswordUrl(appKey) {
        const passwordUrl = new URL('/acceso/nueva-contrasena/', window.location.origin);
        passwordUrl.searchParams.set('app', appKey);

        return passwordUrl.toString();
      }

      async function bootInviteAccept() {
        const response = await fetch('/api/auth-config', { headers: { Accept: 'application/json' } });
        const config = await response.json();

        if (!config.enabled) {
          setStatus(
            'Falta configurar SUPABASE_URL y SUPABASE_ANON_KEY para aceptar invitaciones.',
            true
          );
          return;
        }

        const queryParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));

        const appKey = inferAppKey(queryParams, hashParams);
        const destinationUrl = buildPasswordUrl(appKey);
        const destination = new URL(destinationUrl);

        queryParams.forEach((value, key) => {
          if (!destination.searchParams.has(key)) {
            destination.searchParams.set(key, value);
          }
        });

        hashParams.forEach((value, key) => {
          if (!destination.searchParams.has(key)) {
            destination.searchParams.set(key, value);
          }
        });

        window.location.replace(destination.toString());
      }

      bootInviteAccept().catch(() => {
        setStatus('No se pudo inicializar la aceptación de invitación. Intenta de nuevo.', true);
      });
    </script>
  </body>
</html>
