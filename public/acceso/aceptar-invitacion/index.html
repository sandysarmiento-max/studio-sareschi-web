<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aceptar invitación | Studio Sareschi</title>
    <meta
      name="description"
      content="Validando invitación para crear tu contraseña de acceso en Studio Sareschi."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Studio Sareschi</a>
        <nav aria-label="Principal">
          <ul class="nav-links">
            <li><a id="login-link" href="/acceso/">Iniciar sesión</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section section-soft">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow">Acceso por invitación</p>
            <h1>Aceptando tu invitación…</h1>
            <p class="hero-copy" style="margin: 0">
              Estamos validando tu enlace para que puedas crear tu contraseña.
            </p>
          </div>

          <article class="card" style="max-width: 620px">
            <p id="status" class="tiny-note" aria-live="polite"></p>
            <a id="fallback-link" class="btn btn-secondary" href="/acceso/" style="display:inline-flex;margin-top:16px">
              Volver a iniciar sesión
            </a>
          </article>
        </div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const loginLink = document.getElementById('login-link');
      const fallbackLink = document.getElementById('fallback-link');

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? '#8f1d4f' : '';
      }

      const APP_CONFIG = {
        aral_calc: { next: '/aral-calc/' },
        folia: { next: '/admin/folia-preview/' },
      };

      function normalizeAppKey(rawAppKey, fallback = 'aral_calc') {
        const normalized = String(rawAppKey || '').trim().toLowerCase();
        return APP_CONFIG[normalized] ? normalized : fallback;
      }

      function inferAppKeyFromNext(nextRaw) {
        const value = String(nextRaw || '').toLowerCase();
        if (value.includes('/folia')) return 'folia';
        return 'aral_calc';
      }

      function buildPasswordUrl({ redirectToRaw, appKey }) {
        const passwordUrl = new URL('/acceso/nueva-contrasena/', window.location.origin);

        if (redirectToRaw) {
          passwordUrl.searchParams.set('next', redirectToRaw);
        }

        if (appKey) {
          passwordUrl.searchParams.set('app', appKey);
        }

        return passwordUrl.toString();
      }

      async function bootInviteAccept() {
        const response = await fetch('/api/auth-config', { headers: { Accept: 'application/json' } });
        const config = await response.json();

        if (!config.enabled) {
          setStatus(
            'Falta configurar SUPABASE_URL y SUPABASE_ANON_KEY para aceptar invitaciones.',
            true
          );
          return;
        }

        const supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

        const queryParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));

        const tokenHash = queryParams.get('token_hash') || hashParams.get('token_hash') || '';
        const inviteType = queryParams.get('type') || hashParams.get('type') || '';
        const redirectTo = queryParams.get('redirect_to') || hashParams.get('redirect_to') || '';
        const appFromRedirect = new URLSearchParams(String(redirectTo || '').split('?')[1] || '').get('app');
        const appFromUrl = queryParams.get('app') || hashParams.get('app') || appFromRedirect || '';
        const inferredApp = normalizeAppKey(appFromUrl, inferAppKeyFromNext(redirectTo));
        const finalRedirectTo = redirectTo || APP_CONFIG[inferredApp].next;
        const code = queryParams.get('code');

        if (loginLink) {
          loginLink.href = `/acceso/?app=${encodeURIComponent(inferredApp)}`;
        }

        if (fallbackLink) {
          fallbackLink.href = `/acceso/?app=${encodeURIComponent(inferredApp)}`;
        }

        if (code) {
          const { error } = await supabaseClient.auth.exchangeCodeForSession(code);

          if (error) {
            setStatus('El enlace de invitación no es válido o ya expiró. Solicita una nueva invitación.', true);
            return;
          }

          window.location.href = buildPasswordUrl({ redirectToRaw: finalRedirectTo, appKey: inferredApp });
          return;
        }

        if (!tokenHash) {
          setStatus('El enlace no contiene token de invitación. Solicita una nueva invitación.', true);
          return;
        }

        if (inviteType && inviteType !== 'invite') {
          setStatus('Este enlace no corresponde a una invitación válida.', true);
          return;
        }

        const { error } = await supabaseClient.auth.verifyOtp({
          token_hash: tokenHash,
          type: 'invite',
        });

        if (error) {
          setStatus('No se pudo validar la invitación. Es posible que el enlace haya expirado.', true);
          return;
        }

        window.location.href = buildPasswordUrl({ redirectToRaw: finalRedirectTo, appKey: inferredApp });
      }

      bootInviteAccept().catch(() => {
        setStatus('No se pudo inicializar la aceptación de invitación. Intenta de nuevo.', true);
      });
    </script>
  </body>
</html>
