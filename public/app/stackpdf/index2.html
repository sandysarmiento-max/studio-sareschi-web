<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackPDF | Studio Sareschi</title>
    <meta name="description" content="StackPDF protegido para suscriptoras de Studio Sareschi." />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app/stackpdf/shell.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="section section-soft app-shell">
      <div class="container">
        <article id="loading" class="card status-card">
          <p class="eyebrow">Acceso protegido</p>
          <h1 style="margin-top:0">StackPDF</h1>
          <p class="tiny-note" id="status-message">Validando acceso…</p>
        </article>
        <article id="blocked" class="card status-card" hidden>
          <p class="eyebrow">Acceso protegido</p>
          <h1 style="margin-top:0">Acceso no habilitado</h1>
          <p>Tu cuenta no tiene acceso activo a StackPDF.</p>
          <p class="tiny-note">Si crees que esto es un error, escríbenos para revisar tu invitación.</p>
          <a class="btn btn-secondary" href="/acceso/?app=stackpdf">Volver a acceso</a>
        </article>
      </div>
    </main>
    <iframe id="app-frame" class="app-frame" hidden title="StackPDF" src="/app/stackpdf/app/index.html"></iframe>
    <script src="/app/stackpdf/gate.js"></script>
  </body>
</html>
