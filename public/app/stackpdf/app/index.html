<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StackPDF | Studio Sareschi</title>
  <meta name="description" content="StackPDF une, ordena y arma tus PDFs para imprimir. Herramienta protegida de Studio Sareschi." />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:#fbf7f5; color:#5b4650; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .stackpdf-auth-card { width:min(560px,100%); background:#fff; border:1px solid #efdbe3; border-radius:22px; padding:22px; box-shadow:0 20px 55px rgba(91,57,75,.10); }
    h1 { margin:0 0 8px; font-size:1.3rem; color:#4f3440; }
    p { margin:0 0 12px; line-height:1.45; color:#795f6a; }
    a { display:inline-flex; align-items:center; justify-content:center; border-radius:999px; border:1px solid #d9a7bc; background:#fff6f9; color:#8b3f5c; padding:10px 14px; text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <section id="stackpdfAuthGate" class="stackpdf-auth-card" role="status" aria-live="polite">
    <h1>StackPDF</h1>
    <p id="stackpdfAuthMessage">Validando tu acceso…</p>
    <a id="stackpdfAuthLink" href="/acceso/?app=stackpdf" hidden>Volver a acceso</a>
  </section>
  <script src="./auth-loader.js"></script>
</body>
</html>
