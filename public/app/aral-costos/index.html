<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aral Costos | Studio Sareschi</title>
    <meta name="description" content="Aral Costos para suscriptoras de Studio Sareschi." />
    <link rel="manifest" href="/app/aral-costos/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .app-shell { min-height: 100vh; }
      .app-frame { width: 100%; height: 100vh; border: 0; display: block; }
      .status-card { max-width: 720px; margin: 0 auto; }
    </style>
  </head>
  <body>
    <main class="section section-soft app-shell">
      <div class="container">
        <article id="loading" class="card status-card">
          <h1 style="margin-top:0">Aral Costos</h1>
          <p class="tiny-note" id="status-message">Validando acceso…</p>
        </article>

        <article id="blocked" class="card status-card" hidden>
          <h1 style="margin-top:0">Acceso bloqueado</h1>
          <p>Tu cuenta no tiene acceso activo a Aral Costos.</p>
          <p class="tiny-note">Si crees que esto es un error, escríbenos para revisar tu invitación.</p>
          <a class="btn btn-secondary" href="/acceso/?app=aral_costos">Volver a acceso</a>
        </article>
      </div>
    </main>

    <iframe
      id="app-frame"
      class="app-frame"
      hidden
      title="Aral Costos"
      src="/app/aral-costos/app/index.html"
    ></iframe>

    <script>
      const APP_KEY = 'aral_costos';
      const APP_NEXT = '/app/aral-costos/';

      async function loadAuthConfig() {
        const response = await fetch('/api/auth-config', {
          headers: { Accept: 'application/json' },
        });

        if (!response.ok) {
          throw new Error(`No se pudo cargar auth-config (${response.status})`);
        }

        return response.json();
      }

      function showBlocked(message) {
        const loading = document.getElementById('loading');
        const blocked = document.getElementById('blocked');
        const statusMessage = document.getElementById('status-message');

        loading.hidden = true;
        blocked.hidden = false;

        if (message && statusMessage) {
          statusMessage.textContent = message;
        }
      }

     function showApp() {
  const shell = document.querySelector('.app-shell');
  const frame = document.getElementById('app-frame');

  document.getElementById('loading').hidden = true;
  document.getElementById('blocked').hidden = true;

  if (shell) {
    shell.style.display = 'none';
  }

  frame.hidden = false;
  frame.style.position = 'fixed';
  frame.style.inset = '0';
  frame.style.width = '100%';
  frame.style.height = '100dvh';
}

      async function registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;

        await navigator.serviceWorker.register('/app/aral-costos/sw.js', {
          scope: '/app/aral-costos/',
        });
      }

      async function hasAccess(supabaseClient) {
        const { data, error } = await supabaseClient
          .from('app_access')
          .select('id')
          .eq('app_key', APP_KEY)
          .eq('status', 'active')
          .limit(1)
          .maybeSingle();

        if (error) {
          return false;
        }

        return Boolean(data);
      }

      (async () => {
        try {
          const config = await loadAuthConfig();

          if (!config.enabled) {
            showBlocked('Acceso no disponible temporalmente.');
            return;
          }

          const supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
          const {
            data: { session },
          } = await supabaseClient.auth.getSession();

          if (!session) {
            const next = encodeURIComponent(APP_NEXT);
            window.location.href = `/acceso/?app=${APP_KEY}&next=${next}`;
            return;
          }

          const allowed = await hasAccess(supabaseClient);
          if (!allowed) {
            showBlocked();
            return;
          }

          showApp();
          await registerServiceWorker();
        } catch (error) {
          showBlocked('No fue posible validar tu acceso en este momento.');
          console.error('aral-costos boot error', error);
        }
      })();
    </script>
  </body>
</html>
