<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso a Folia | Studio Sareschi</title>
    <meta
      name="description"
      content="Ruta de transición protegida hacia Folia."
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main>
      <section class="section section-soft">
        <div class="container">
          <article class="card" style="max-width:700px">
            <p class="eyebrow">Acceso protegido</p>
            <h1 style="margin-top:0">Validando tu sesión…</h1>
            <p id="status">Te estamos redirigiendo.</p>
            <a class="btn btn-secondary" href="/acceso/?app=folia&next=/admin/folia-preview/">Ir a login</a>
          </article>
        </div>
      </section>
    </main>

    <script>
      const status = document.getElementById('status');

      (async () => {
        try {
          const response = await fetch('/api/auth-config', { headers: { Accept: 'application/json' } });
          const config = await response.json();

          if (!config.enabled) {
            status.textContent = 'Falta configuración de auth. Redirigiendo a login…';
            window.location.href = '/acceso/?app=folia&next=/admin/folia-preview/';
            return;
          }

          const supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
          const {
            data: { session },
          } = await supabaseClient.auth.getSession();

          if (!session) {
            status.textContent = 'Necesitas iniciar sesión para entrar a Folia.';
            window.location.href = '/acceso/?app=folia&next=/admin/folia-preview/';
            return;
          }

          const { data: accessData, error: accessError } = await supabaseClient
            .from('app_access')
            .select('id')
            .eq('app_key', 'folia')
            .eq('status', 'active')
            .limit(1)
            .maybeSingle();

          if (accessError || !accessData) {
            status.textContent = 'Tu cuenta no tiene acceso habilitado a Folia.';
            document.querySelector('h1').textContent = 'Acceso no habilitado';
            const link = document.querySelector('a.btn');
            link.href = '/acceso/?app=folia&next=/admin/folia-preview/';
            link.textContent = 'Volver a acceso';
            return;
          }

          window.location.href = '/admin/folia-preview/';
        } catch (error) {
          status.textContent = 'No se pudo validar tu sesión. Intenta iniciar sesión nuevamente.';
          window.location.href = '/acceso/?app=folia&next=/admin/folia-preview/';
        }
      })();
    </script>
  </body>
</html>
